<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Object Types</title>
<style>
  :root{
    --bg:#f0f0f0; --panel:#ffffff; --border:#d7d7d7; --border2:#c2c2c2;
    --text:#1f1f1f; --dim:#6a6a6a; --accent:#0078d7; --danger:#c0392b;
    --chip:#eef4fb; --input:#ffffff; --font:"Segoe UI","Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;height:100vh;display:flex;flex-direction:column}
  header{padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--border);}
  header .title{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
  header .layer{margin-top:4px;font-family:"Consolas",monospace;font-size:13px;color:var(--accent);word-break:break-all}
  header .hint{margin-top:4px;color:var(--dim);font-size:11.5px}
  #list{flex:1;overflow-y:auto;padding:10px 12px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px}
  .card.primary{border-left:3px solid var(--accent)}
  .row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
  .row:last-child{margin-bottom:0}
  label{color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;width:74px;flex:none}
  input[type=text],textarea,select{flex:1;background:var(--input);color:var(--text);border:1px solid var(--border2);border-radius:4px;padding:5px 7px;font-family:var(--font);font-size:12.5px;outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}
  textarea{resize:vertical;min-height:34px}
  .card .name{font-weight:600;font-size:13.5px}
  .card-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .badge{font-size:9.5px;font-weight:700;letter-spacing:.5px;color:var(--accent);background:var(--chip);border:1px solid #cfe0f3;border-radius:10px;padding:2px 7px;text-transform:uppercase}
  .spacer{flex:1}
  .prim{display:flex;align-items:center;gap:5px;color:var(--dim);font-size:11.5px;cursor:pointer;white-space:nowrap}
  .del{background:transparent;border:1px solid var(--border2);color:var(--danger);border-radius:4px;padding:3px 8px;font-size:11.5px;cursor:pointer}
  .del:hover{background:#fbeceb;border-color:var(--danger)}
  #add{margin:2px 12px 10px;padding:8px;border:1px dashed var(--border2);background:transparent;color:var(--accent);border-radius:6px;cursor:pointer;font-family:var(--font);font-size:12.5px}
  #add:hover{background:var(--chip)}
  .empty{padding:30px 16px;text-align:center;color:var(--dim)}
  .status{padding:6px 14px;border-top:1px solid var(--border);color:var(--dim);font-size:11px;background:var(--panel);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  @media (prefers-color-scheme: dark){
    :root{--bg:#26262a;--panel:#2f2f33;--border:#1e1e21;--border2:#46464c;--text:#e6e6e8;--dim:#9a9aa2;--accent:#4d9fe0;--danger:#d1605c;--chip:#33507a;--input:#232326;}
    .badge{border-color:#3a5a86}.del:hover{background:#5a3735}
  }
</style>
</head>
<body>
  <header>
    <div class="title">⧉ Object Types</div>
    <div class="layer" id="layer">— no layer selected —</div>
    <div class="hint" id="hint">Select a layer in the emulator to see its expected Branch object types.</div>
  </header>
  <div id="list"></div>
  <button id="add" hidden>+ Add object type for this layer</button>
  <div class="status" id="status">Waiting for the layer emulator…</div>

<script>
(function(){
  "use strict";
  const listEl=document.getElementById("list");
  const layerEl=document.getElementById("layer");
  const hintEl=document.getElementById("hint");
  const addBtn=document.getElementById("add");
  const statusEl=document.getElementById("status");
  const CATEGORIES=["Glulam","Steel","CLT","DLT","Blocking","Timber","Machining","Connection","Other"];
  let currentLayer=null;
  let statusTimer=null;
  function say(msg){ statusEl.textContent=msg; clearTimeout(statusTimer); statusTimer=setTimeout(()=>{ statusEl.textContent=currentLayer?("Layer: "+currentLayer):"Waiting for the layer emulator…"; },2500); }

  function setLayer(name){
    name=name||null;
    if(name===currentLayer) return;
    currentLayer=name;
    layerEl.textContent=name||"— no layer selected —";
    hintEl.style.display=name?"none":"";
    addBtn.hidden=!name;
    load();
  }

  async function load(){
    if(!currentLayer){ listEl.innerHTML=""; statusEl.textContent="Waiting for the layer emulator…"; return; }
    try{
      const r=await fetch("api/object-types?home_layer="+encodeURIComponent(currentLayer));
      const {types}=await r.json();
      render(types||[]);
      statusEl.textContent="Layer: "+currentLayer+"  ·  "+(types||[]).length+" object type"+((types||[]).length===1?"":"s");
    }catch(e){ listEl.innerHTML='<div class="empty">Couldn’t reach the server.</div>'; }
  }

  function field(labelTxt, value, onSave, opts){
    opts=opts||{};
    const row=document.createElement("div"); row.className="row";
    const lab=document.createElement("label"); lab.textContent=labelTxt; row.appendChild(lab);
    let input;
    if(opts.select){ input=document.createElement("select"); (opts.options||[]).forEach(o=>{const op=document.createElement("option");op.value=o;op.textContent=o;input.appendChild(op);}); input.value=value||""; }
    else if(opts.textarea){ input=document.createElement("textarea"); input.value=value||""; }
    else { input=document.createElement("input"); input.type="text"; input.value=value||""; if(opts.placeholder) input.placeholder=opts.placeholder; }
    input.addEventListener("change",()=>onSave(input.value));
    row.appendChild(input); return row;
  }

  function render(types){
    listEl.innerHTML="";
    if(!types.length){ listEl.innerHTML='<div class="empty">No object types mapped to this layer yet.<br>Use “+ Add” below to define one.</div>'; return; }
    for(const t of types){
      const card=document.createElement("div"); card.className="card"+(t.is_primary?" primary":"");
      const head=document.createElement("div"); head.className="card-head";
      const nm=document.createElement("span"); nm.className="name"; nm.textContent=t.name||"(unnamed)"; head.appendChild(nm);
      if(t.is_primary){ const b=document.createElement("span"); b.className="badge"; b.textContent="Primary"; head.appendChild(b); }
      const sp=document.createElement("span"); sp.className="spacer"; head.appendChild(sp);
      const prim=document.createElement("label"); prim.className="prim";
      const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=!!t.is_primary;
      cb.addEventListener("change",()=>{ t.is_primary=cb.checked; save(t); });
      prim.appendChild(cb); prim.appendChild(document.createTextNode("primary")); head.appendChild(prim);
      const del=document.createElement("button"); del.className="del"; del.textContent="Delete";
      del.addEventListener("click",()=>{ if(confirm("Delete object type “"+(t.name||"")+"”?")) remove(t.id); });
      head.appendChild(del);
      card.appendChild(head);
      card.appendChild(field("Name", t.name, v=>{ t.name=v; nm.textContent=v||"(unnamed)"; save(t); }));
      card.appendChild(field("Category", t.category, v=>{ t.category=v; save(t); }, {select:true, options:CATEGORIES}));
      card.appendChild(field("Branch key", t.branch_key, v=>{ t.branch_key=v; save(t); }, {placeholder:"Branch class (fill once verified)"}));
      card.appendChild(field("Notes", t.description, v=>{ t.description=v; save(t); }, {textarea:true}));
      listEl.appendChild(card);
    }
  }

  async function save(t){
    try{
      await fetch("api/object-types/"+encodeURIComponent(t.id),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(t)});
      say("Saved “"+(t.name||"")+"”");
    }catch(e){ say("Save failed"); }
  }
  async function remove(id){
    try{ await fetch("api/object-types/"+encodeURIComponent(id),{method:"DELETE"}); say("Deleted"); load(); }
    catch(e){ say("Delete failed"); }
  }
  addBtn.addEventListener("click",()=>{
    if(!currentLayer) return;
    const t={id:(crypto.randomUUID?crypto.randomUUID():"ot_"+Date.now()), name:"New object type", category:"Other", description:"", home_layer:currentLayer, branch_key:"", is_primary:false};
    save(t).then(load);
  });

  // ---- sync with the emulator ----
  const channel=("BroadcastChannel" in window)?new BroadcastChannel("sc-objects"):null;
  if(channel){
    channel.onmessage=(e)=>{ if(e&&e.data&&e.data.type==="select") setLayer(e.data.layer); };
    channel.postMessage({type:"hello"}); // ask the emulator for the current selection
  }
  window.addEventListener("storage",(e)=>{ if(e.key==="sc-selected-layer") setLayer(e.newValue||null); });
  try{ const init=localStorage.getItem("sc-selected-layer"); if(init) setLayer(init); }catch(e){}
})();
</script>
</body>
</html>
