<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Object Types</title>
<style>
  /* Shared palette with the layer emulator (index.html) so the two windows match. */
  :root {
    --panel-bg: #2f2f33;
    --panel-bg-deep: #26262a;
    --list-bg: #2f2f33;
    --row-hover: #3a3a3f;
    --row-selected: #33507a;
    --row-selected-border: #4d7bbd;
    --border: #1e1e21;
    --border-light: #46464c;
    --text: #e6e6e8;
    --text-dim: #9a9aa2;
    --accent: #4d9fe0;
    --danger: #d1605c;
    --input-bg: #232326;
    --input-hover: #2b2b2f;
    --btn-bg: #3d3d43;
    --btn-hover: #4a4a51;
    --btn-active: #333338;
    --tooltip-bg: #1b1b1e;
    --titlebar-a: #3a3a3f;
    --titlebar-b: #313136;
    --scroll-thumb: #4a4a51;
    --drop-tint: rgba(77,159,224,.16);
    --danger-hover-bg: #5a3735;
    --font: "Segoe UI", "Inter", system-ui, -apple-system, sans-serif;
    --mono: "Consolas", "SF Mono", monospace;
  }
  body.light {
    --panel-bg: #f0f0f0;
    --panel-bg-deep: #e4e4e4;
    --list-bg: #ffffff;
    --row-hover: #eaf2fb;
    --row-selected: #cce4f7;
    --row-selected-border: #90c3ef;
    --border: #ababab;
    --border-light: #bdbdbd;
    --text: #1f1f1f;
    --text-dim: #5c5c5c;
    --accent: #0078d7;
    --input-bg: #ffffff;
    --input-hover: #f3f9ff;
    --btn-bg: #fbfbfb;
    --btn-hover: #e6f2fc;
    --btn-active: #d9ecfb;
    --tooltip-bg: #fafafa;
    --titlebar-a: #fbfbfb;
    --titlebar-b: #ececec;
    --scroll-thumb: #c2c2c2;
    --drop-tint: rgba(0,120,215,.12);
    --danger-hover-bg: #f3dad9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    /* "Notion white" backdrop behind the floating panel (matches the Notion page
       the iframe sits on). Intentionally not themed — app/panel colors are untouched
       and the panel's drop shadow still projects onto this white. */
    background: #ffffff;
    color: var(--text);
    font-size: 13px;
    display: flex;
    flex-direction: column;
    padding: 12px;
  }
  /* Floating, rounded, drop-shadowed panel — matches the layer emulator */
  .panel {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,.187);
  }

  /* Title bar — mirrors the layer emulator's */
  .titlebar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: linear-gradient(var(--titlebar-a), var(--titlebar-b));
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    letter-spacing: .2px;
    flex: none;
  }
  .titlebar .tb-icon {
    width: 22px; height: 22px; flex: none;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 22px; line-height: 1;
  }
  .titlebar .sub { color: var(--text-dim); font-weight: 400; font-size: 11.5px; margin-left: auto; }

  .tool {
    width: 30px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 3px;
    color: var(--text);
    cursor: pointer;
    position: relative;
  }
  .tool:hover { background: var(--btn-hover); border-color: var(--border-light); }
  .tool:active { background: var(--btn-active); }
  .tool svg { width: 16px; height: 16px; display: block; }
  .tool::after {
    content: attr(data-tip);
    position: absolute; top: 110%; right: 0;
    background: var(--tooltip-bg);
    border: 1px solid var(--border-light);
    color: var(--text);
    font-size: 11px; padding: 3px 7px; border-radius: 3px;
    white-space: nowrap; opacity: 0; pointer-events: none;
    transition: opacity .12s; z-index: 30;
  }
  .tool:hover::after { opacity: 1; }

  /* Current-layer bar */
  .layerbar {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px;
    background: var(--panel-bg-deep);
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .layerbar .lb-label {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-dim); flex: none;
  }
  .layerbar .lb-name {
    font-family: var(--mono); font-size: 12.5px; color: var(--accent);
    word-break: break-all; flex: 1;
  }
  .layerbar .lb-count {
    font-size: 11px; color: var(--text-dim); flex: none; white-space: nowrap;
  }

  #list { flex: 1; min-height: 0; overflow-y: auto; padding: 10px 12px; background: var(--panel-bg); }
  #list::-webkit-scrollbar { width: 10px; }
  #list::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 5px; }

  .card {
    background: var(--list-bg);
    border: 1px solid var(--border-light);
    border-radius: 5px;
    padding: 10px;
    margin-bottom: 8px;
  }
  .card-head { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  /* The title is the editable name field — borderless until hover/focus. */
  .name-input {
    flex: 1; min-width: 0;
    font-weight: 600; font-size: 13.5px; color: var(--text);
    font-family: var(--font); background: transparent;
    border: 1px solid transparent; border-radius: 3px;
    padding: 3px 5px; outline: none;
  }
  .name-input:hover { border-color: var(--border-light); }
  .name-input:focus { border-color: var(--accent); background: var(--input-bg); }
  .del-icon {
    flex: none; width: 26px; height: 24px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid transparent; border-radius: 3px;
    color: var(--text-dim); cursor: pointer;
  }
  .del-icon svg { width: 13px; height: 13px; display: block; }
  .del-icon:hover { color: var(--danger); background: var(--danger-hover-bg); border-color: var(--danger); }

  .fl-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .fl-row:last-child { margin-bottom: 0; }
  .fl-label {
    color: var(--text-dim); font-size: 10.5px; text-transform: uppercase;
    letter-spacing: .5px; width: 74px; flex: none;
  }
  input[type=text], textarea, select {
    flex: 1; width: 100%;
    background: var(--input-bg); color: var(--text);
    border: 1px solid var(--border-light); border-radius: 3px;
    padding: 5px 7px; font-family: var(--font); font-size: 12.5px; outline: none;
  }
  textarea { resize: vertical; min-height: 34px; font-family: var(--font); }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }

  #add {
    margin: 2px 12px 10px; padding: 8px;
    border: 1px dashed var(--border-light); background: transparent;
    color: var(--accent); border-radius: 5px; cursor: pointer;
    font-family: var(--font); font-size: 12.5px; flex: none;
  }
  #add:hover { background: var(--drop-tint); }

  .empty { padding: 30px 16px; text-align: center; color: var(--text-dim); line-height: 1.6; }
  .notice {
    margin: 12px; padding: 14px 16px;
    border: 1px dashed var(--border-light); border-radius: 6px;
    background: var(--panel-bg-deep); color: var(--text-dim);
    font-size: 12.5px; line-height: 1.6;
  }
  .notice strong { color: var(--text); }
  .notice .mono { font-family: var(--mono); color: var(--accent); }

  .status {
    padding: 6px 12px; border-top: 1px solid var(--border);
    color: var(--text-dim); font-size: 11px; background: var(--panel-bg);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: none;
  }

  /* Confirm modal — native confirm() is blocked in the Notion iframe/popup */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.55);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--panel-bg); border: 1px solid var(--border-light);
    border-radius: 6px; padding: 18px; width: min(340px, 88vw);
    box-shadow: 0 12px 40px rgba(0,0,0,.6);
  }
  .modal h3 { font-size: 14px; margin-bottom: 8px; }
  .modal p { color: var(--text-dim); font-size: 12.5px; margin-bottom: 14px; line-height: 1.45; word-break: break-word; }
  .modal .actions { display: flex; justify-content: flex-end; gap: 8px; }
  .modal .btn {
    background: var(--btn-bg); color: var(--text); border: 1px solid var(--border-light);
    border-radius: 3px; padding: 5px 12px; font-size: 12px; cursor: pointer; font-family: var(--font);
  }
  .modal .btn:hover { background: var(--btn-hover); }
  .modal .btn.danger { color: var(--danger); }
  .modal .btn.danger:hover { background: var(--danger-hover-bg); border-color: var(--danger); }
</style>
</head>
<body class="light">
  <div class="panel">
    <div class="titlebar">
      <span class="tb-icon" aria-hidden="true">⧉</span>
      <span>Object Types</span>
      <span class="sub">expected Branch objects per layer</span>
      <button class="tool" id="themeToggle" data-tip="Dark mode"></button>
    </div>

    <div class="layerbar">
      <span class="lb-label">Layer</span>
      <span class="lb-name" id="layer">— none —</span>
      <span class="lb-count" id="count"></span>
    </div>

    <div id="list"></div>
    <div id="parentNotice" class="notice" hidden></div>
    <button id="add" hidden>+ Add object type for this layer</button>
    <div class="status" id="status">Waiting for the layer emulator…</div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal" role="dialog" aria-modal="true">
      <h3 id="modalTitle">Delete object type</h3>
      <p id="modalBody"></p>
      <div class="actions">
        <button class="btn" id="modalCancel">Cancel</button>
        <button class="btn danger" id="modalConfirm">Delete</button>
      </div>
    </div>
  </div>

<script src="layer-humanize.js"></script>
<script>
(function () {
  "use strict";
  const listEl = document.getElementById("list");
  const layerEl = document.getElementById("layer");
  const countEl = document.getElementById("count");
  const addBtn = document.getElementById("add");
  const statusEl = document.getElementById("status");
  const parentNotice = document.getElementById("parentNotice");
  const themeBtn = document.getElementById("themeToggle");
  const overlay = document.getElementById("overlay");
  const modalTitle = document.getElementById("modalTitle");
  const modalBody = document.getElementById("modalBody");
  const modalConfirm = document.getElementById("modalConfirm");
  const modalCancel = document.getElementById("modalCancel");

  const SHARED_THEME_KEY = "sc-theme";
  const H0 = window.LayerHumanize || {};
  const MATERIALS = H0.MATERIALS || [];
  const BRANCH_CLASSES = H0.BRANCH_CLASSES || [];
  const ICON_SUN = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="8" cy="8" r="3.2"/><path d="M8 1.2v1.8M8 13v1.8M1.2 8H3M13 8h1.8M3.2 3.2l1.3 1.3M11.5 11.5l1.3 1.3M12.8 3.2l-1.3 1.3M4.5 11.5l-1.3 1.3"/></svg>';
  const ICON_MOON = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.4 9.9A5.6 5.6 0 0 1 6.1 2.6 5.9 5.9 0 1 0 13.4 9.9z"/></svg>';
  const ICON_TRASH = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2.5 4h11M6 4V2.7c0-.4.3-.7.7-.7h2.6c.4 0 .7.3.7.7V4M12.3 4l-.5 8.6c0 .6-.5 1-1 1H5.2c-.5 0-1-.4-1-1L3.7 4M6.5 6.8v4M9.5 6.8v4"/></svg>';

  // Custom confirm dialog — native confirm() is suppressed inside the Notion iframe/popup.
  let confirmCb = null;
  function askConfirm(title, body, cb) {
    modalTitle.textContent = title;
    modalBody.textContent = body;
    confirmCb = cb;
    overlay.classList.add("show");
    modalConfirm.focus();
  }
  function closeModal() { overlay.classList.remove("show"); confirmCb = null; }
  modalConfirm.addEventListener("click", () => { const cb = confirmCb; closeModal(); if (cb) cb(); });
  modalCancel.addEventListener("click", closeModal);
  overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape" && overlay.classList.contains("show")) closeModal(); });

  let currentLayer = null;
  let currentIsLeaf = true;
  let statusTimer = null;

  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  // The layer emulator stores {name, isLeaf} as JSON; tolerate a legacy plain name.
  function parseSelection(raw) {
    if (!raw) return { name: null, isLeaf: true };
    try { const o = JSON.parse(raw); if (o && typeof o === "object") return { name: o.name || null, isLeaf: o.isLeaf !== false }; } catch (e) {}
    return { name: raw, isLeaf: true };
  }
  function restingStatus() {
    return currentLayer ? ("Layer: " + currentLayer) : "Waiting for the layer emulator…";
  }
  function say(msg) {
    statusEl.textContent = msg;
    clearTimeout(statusTimer);
    statusTimer = setTimeout(() => { statusEl.textContent = restingStatus(); }, 2500);
  }

  // ---- Theme (kept in lock-step with the layer emulator) ----
  function applyThemeUI(isLight) {
    document.body.classList.toggle("light", isLight);
    themeBtn.innerHTML = isLight ? ICON_MOON : ICON_SUN;
    themeBtn.dataset.tip = isLight ? "Dark mode" : "Light mode";
  }
  function setTheme(isLight, broadcast) {
    isLight = !!isLight;
    applyThemeUI(isLight);
    try { localStorage.setItem(SHARED_THEME_KEY, isLight ? "light" : "dark"); } catch (e) {}
    if (broadcast && channel) channel.postMessage({ type: "theme", light: isLight });
  }
  themeBtn.addEventListener("click", () => setTheme(!document.body.classList.contains("light"), true));

  // ---- Layer selection / hover ----
  function setLayer(name, isLeaf) {
    name = name || null;
    // isLeaf is absent on the localStorage fallback path; assume leaf so it still works.
    const leaf = (isLeaf === undefined || isLeaf === null) ? true : !!isLeaf;
    if (name === currentLayer && leaf === currentIsLeaf) return;
    currentLayer = name;
    currentIsLeaf = leaf;
    layerEl.textContent = name || "— none —";
    countEl.textContent = "";

    if (!name) {
      parentNotice.hidden = true;
      addBtn.hidden = true;
      listEl.innerHTML = '<div class="empty">Select or hover a layer in the emulator<br>to see its expected Branch object types.</div>';
      statusEl.textContent = "Waiting for the layer emulator…";
      return;
    }
    if (!leaf) {
      // Parent layers never hold objects — only final child layers do.
      listEl.innerHTML = "";
      addBtn.hidden = true;
      parentNotice.hidden = false;
      parentNotice.innerHTML =
        '<strong>' + escapeHtml(name) + '</strong> is a parent layer.<br><br>' +
        'Object types are assigned to <strong>final child layers</strong> only. ' +
        'Pick a leaf layer (one with no sublayers) to define the objects that belong on it.';
      statusEl.textContent = "Parent layer · no objects assigned here";
      return;
    }
    parentNotice.hidden = true;
    addBtn.hidden = false;
    load();
  }

  async function load() {
    if (!currentLayer || !currentIsLeaf) return;
    try {
      const r = await fetch("api/object-types?home_layer=" + encodeURIComponent(currentLayer));
      const { types } = await r.json();
      render(types || []);
      const n = (types || []).length;
      countEl.textContent = n + " type" + (n === 1 ? "" : "s");
      statusEl.textContent = "Layer: " + currentLayer;
    } catch (e) {
      listEl.innerHTML = '<div class="empty">Couldn’t reach the server.</div>';
    }
  }

  function field(labelTxt, value, onSave, opts) {
    opts = opts || {};
    const row = document.createElement("div"); row.className = "fl-row";
    const lab = document.createElement("label"); lab.className = "fl-label"; lab.textContent = labelTxt;
    row.appendChild(lab);
    let input;
    if (opts.select) {
      input = document.createElement("select");
      const list = (opts.options || []).slice();
      if (value && list.indexOf(value) === -1) list.unshift(value); // keep a value not in the list
      if (opts.blank) { const op = document.createElement("option"); op.value = ""; op.textContent = opts.blankLabel || "—"; input.appendChild(op); }
      list.forEach(o => { const op = document.createElement("option"); op.value = o; op.textContent = o; input.appendChild(op); });
      input.value = value || "";
    } else if (opts.textarea) {
      input = document.createElement("textarea"); input.value = value || "";
    } else {
      input = document.createElement("input"); input.type = "text"; input.value = value || "";
      if (opts.placeholder) input.placeholder = opts.placeholder;
    }
    input.addEventListener("change", () => onSave(input.value));
    row.appendChild(input);
    return row;
  }

  function render(types) {
    listEl.innerHTML = "";
    if (!types.length) {
      listEl.innerHTML = '<div class="empty">No object types mapped to this layer yet.<br>Use “+ Add” below to define one.</div>';
      return;
    }
    for (const t of types) {
      const card = document.createElement("div"); card.className = "card";
      const head = document.createElement("div"); head.className = "card-head";
      // The card title IS the editable name — shown once, no separate Name row.
      const nm = document.createElement("input"); nm.className = "name-input"; nm.type = "text";
      nm.value = t.name || ""; nm.placeholder = "(unnamed)";
      nm.addEventListener("change", () => { t.name = nm.value; save(t); });
      head.appendChild(nm);
      const del = document.createElement("button"); del.className = "del-icon";
      del.title = "Delete this object type"; del.innerHTML = ICON_TRASH;
      del.addEventListener("click", () => {
        askConfirm("Delete object type", "Delete “" + (t.name || "this object type") + "” from " + (currentLayer || "this layer") + "?", () => remove(t.id));
      });
      head.appendChild(del);
      card.appendChild(head);
      card.appendChild(field("Material", t.material, v => { t.material = v; save(t); }, { select: true, options: MATERIALS, blank: true, blankLabel: "— material —" }));
      card.appendChild(field("Branch type", t.branch_key, v => { t.branch_key = v; save(t); }, { select: true, options: BRANCH_CLASSES, blank: true, blankLabel: "— type —" }));
      card.appendChild(field("Type prefix", t.branch_prefix, v => { t.branch_prefix = v; save(t); }, { placeholder: "optional mark prefix, e.g. B / C" }));
      card.appendChild(field("Notes", t.description, v => { t.description = v; save(t); }, { textarea: true }));
      listEl.appendChild(card);
    }
  }

  async function save(t) {
    try {
      await fetch("api/object-types/" + encodeURIComponent(t.id), {
        method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(t)
      });
      say("Saved “" + (t.name || "") + "”");
    } catch (e) { say("Save failed"); }
  }
  async function remove(id) {
    try { await fetch("api/object-types/" + encodeURIComponent(id), { method: "DELETE" }); say("Deleted"); load(); }
    catch (e) { say("Delete failed"); }
  }
  addBtn.addEventListener("click", () => {
    if (!currentLayer || !currentIsLeaf) return;
    // Pre-fill name + Branch match (class + prefix) from the layer name.
    const H = window.LayerHumanize || {};
    const guessedName = (H.humanizeLayer && H.humanizeLayer(currentLayer)) || "New object type";
    const bm = (H.guessBranchMatch && H.guessBranchMatch(currentLayer)) || {};
    const mat = (H.guessMaterial && H.guessMaterial(currentLayer)) || "";
    const t = {
      id: (crypto.randomUUID ? crypto.randomUUID() : "ot_" + Date.now()),
      name: guessedName, description: "", home_layer: currentLayer,
      branch_key: bm.branch_key || "", branch_prefix: bm.branch_prefix || "", material: mat
    };
    save(t).then(load);
  });

  // ---- Sync with the layer emulator ----
  const channel = ("BroadcastChannel" in window) ? new BroadcastChannel("sc-objects") : null;
  if (channel) {
    channel.onmessage = (e) => {
      const d = e && e.data; if (!d) return;
      if (d.type === "select") setLayer(d.layer, d.isLeaf);
      else if (d.type === "theme") setTheme(!!d.light, false);
    };
    channel.postMessage({ type: "hello" }); // ask the emulator for its current selection + theme
  }
  window.addEventListener("storage", (e) => {
    if (e.key === "sc-selected-layer") { const s = parseSelection(e.newValue); setLayer(s.name, s.isLeaf); }
    else if (e.key === SHARED_THEME_KEY) setTheme(e.newValue !== "dark", false);
  });

  // ---- Init: theme first (so there's no flash), then any stored selection ----
  (function initTheme() {
    let isLight = true;
    try {
      const s = localStorage.getItem(SHARED_THEME_KEY);
      if (s === "dark") isLight = false; else if (s === "light") isLight = true;
    } catch (e) {}
    setTheme(isLight, false);
  })();
  try { const s = parseSelection(localStorage.getItem("sc-selected-layer")); if (s.name) setLayer(s.name, s.isLeaf); } catch (e) {}
  if (!currentLayer) setLayer(null);
})();
</script>
</body>
</html>
