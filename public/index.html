<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhino 8 Layer Emulator</title>
<style>
  :root {
    --panel-bg: #2f2f33;
    --panel-bg-deep: #26262a;
    --list-bg: #2f2f33;
    --row-hover: #3a3a3f;
    --row-selected: #33507a;
    --row-selected-border: #4d7bbd;
    --border: #1e1e21;
    --border-light: #46464c;
    --text: #e6e6e8;
    --text-dim: #9a9aa2;
    --accent: #4d9fe0;
    --danger: #d1605c;
    --input-bg: #232326;
    --input-hover: #2b2b2f;
    --menu-bg: #232326;
    --btn-bg: #3d3d43;
    --btn-hover: #4a4a51;
    --btn-active: #333338;
    --hover-bg: #3a3a3f;
    --tooltip-bg: #1b1b1e;
    --titlebar-a: #3a3a3f;
    --titlebar-b: #313136;
    --scroll-thumb: #4a4a51;
    --row-line: rgba(255,255,255,.03);
    --swatch-inset: rgba(255,255,255,.18);
    --drop-tint: rgba(77,159,224,.16);
    --danger-hover-bg: #5a3735;
    --ghost-hover: rgba(255,255,255,.08);
    --font: "Segoe UI", "Inter", system-ui, -apple-system, sans-serif;
    --mono: "Consolas", "SF Mono", monospace;
  }
  body.light {
    --panel-bg: #f0f0f0;
    --panel-bg-deep: #e4e4e4;
    --list-bg: #ffffff;
    --row-hover: #eaf2fb;
    --row-selected: #cce4f7;
    --row-selected-border: #90c3ef;
    --border: #ababab;
    --border-light: #bdbdbd;
    --text: #1f1f1f;
    --text-dim: #5c5c5c;
    --accent: #0078d7;
    --input-bg: #ffffff;
    --input-hover: #f3f9ff;
    --menu-bg: #ffffff;
    --btn-bg: #fbfbfb;
    --btn-hover: #e6f2fc;
    --btn-active: #d9ecfb;
    --hover-bg: #e9e9e9;
    --tooltip-bg: #fafafa;
    --titlebar-a: #fbfbfb;
    --titlebar-b: #ececec;
    --scroll-thumb: #c2c2c2;
    --row-line: rgba(0,0,0,.05);
    --swatch-inset: rgba(0,0,0,.1);
    --drop-tint: rgba(0,120,215,.12);
    --danger-hover-bg: #f3dad9;
    --ghost-hover: rgba(0,0,0,.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--panel-bg-deep);
    color: var(--text);
    font-size: 13px;
    display: flex;
    justify-content: center;
    padding: 16px 8px;
  }
  .panel {
    width: 100%;
    max-width: 720px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 28px rgba(0,0,0,.45);
  }

  /* Title bar */
  .titlebar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: linear-gradient(var(--titlebar-a), var(--titlebar-b));
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    letter-spacing: .2px;
  }
  .titlebar .rhino {
    width: 22px; height: 22px;
    flex: none;
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  body.light .titlebar .rhino { color: #000000; }
  .titlebar .rhino svg { width: 100%; height: 100%; display: block; }
  .titlebar .sub { color: var(--text-dim); font-weight: 400; font-size: 11.5px; margin-left: auto; }

  /* Preset bar */
  .preset-bar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--panel-bg-deep);
    border-bottom: 1px solid var(--border);
  }
  .preset-bar label { color: var(--text-dim); font-size: 11.5px; margin-right: 2px; }
  /* Two clearly separated clusters: preset controls | file (import/export) */
  .pb-group { display: flex; align-items: center; gap: 6px; }
  .pb-label {
    color: var(--text-dim);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-right: 2px;
  }
  .pb-divider {
    width: 1px;
    align-self: stretch;
    min-height: 24px;
    background: var(--border-light);
    margin-left: auto; /* push the divider + file cluster to the right edge */
  }
  .preset-combo { position: relative; display: inline-flex; }
  .preset-name-input { min-width: 150px; max-width: 220px; height: 26px; }
  @media (max-width: 560px) {
    .pb-divider { display: none; }
    .pb-file { margin-left: 0; }
  }

  /* Auto-save toggle switch */
  .switch { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; font-size: 12px; color: var(--text-dim); margin-left: 4px; }
  .switch input { position: absolute; opacity: 0; width: 0; height: 0; }
  .switch-track { width: 30px; height: 16px; border-radius: 9px; background: var(--border-light); position: relative; transition: background .15s; flex: none; }
  .switch-thumb { position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: #fff; transition: left .15s; box-shadow: 0 1px 2px rgba(0,0,0,.4); }
  .switch input:checked + .switch-track { background: var(--accent); }
  .switch input:checked + .switch-track .switch-thumb { left: 16px; }
  .switch input:focus-visible + .switch-track { outline: 2px solid var(--accent); outline-offset: 1px; }
  .switch-label { white-space: nowrap; }
  .switch.disabled { opacity: .4; cursor: not-allowed; }
  .switch.disabled .switch-track { cursor: not-allowed; }
  select, input[type="text"] {
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border-light);
    border-radius: 3px;
    padding: 4px 6px;
    font-family: var(--font);
    font-size: 12.5px;
    outline: none;
  }
  select:focus-visible, input[type="text"]:focus-visible, button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }
  input[type="text"]::placeholder { color: #6d6d75; }
  .btn {
    background: var(--btn-bg);
    color: var(--text);
    border: 1px solid var(--border-light);
    border-radius: 3px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font);
  }
  .btn:hover { background: var(--btn-hover); }
  .btn:active { background: var(--btn-active); }
  .btn.danger:hover { background: var(--danger-hover-bg); border-color: var(--danger); }
  .spacer { flex: 1; }

  /* Preset picker trigger (custom dropdown) */
  .preset-trigger {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-width: 150px;
    max-width: 220px;
    height: 26px;
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border-light);
    border-radius: 3px;
    padding: 4px 8px;
    font-size: 12.5px;
    font-family: var(--font);
    cursor: pointer;
  }
  .preset-trigger:hover { background: var(--input-hover); }
  .preset-trigger:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .preset-trigger .dd-label { flex: 1; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .preset-trigger .dd-caret { flex: none; opacity: .65; }

  /* Preset menu rows: star (default) · name (select) · pencil (rename) */
  .preset-pop { padding: 4px; min-width: 240px; }
  .preset-menu-row {
    display: flex;
    align-items: center;
    gap: 2px;
    border-radius: 3px;
    padding: 1px 2px;
  }
  .preset-menu-row:hover { background: var(--hover-bg); }
  .preset-menu-row.current { background: var(--row-selected); }
  .pm-star, .pm-rename {
    flex: none;
    width: 26px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: none; border-radius: 3px;
    color: var(--text-dim); cursor: pointer;
    font-size: 14px; line-height: 1;
  }
  .pm-star:hover, .pm-rename:hover { background: var(--ghost-hover); color: var(--text); }
  .pm-star.on { color: #f0c000; }
  .pm-star.on:hover { color: #f0c000; }
  .pm-rename svg { width: 14px; height: 14px; display: block; }
  .pm-name {
    flex: 1;
    text-align: left;
    background: transparent; border: none;
    color: var(--text); font-family: var(--font); font-size: 12.5px;
    padding: 5px 6px; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border-radius: 3px;
  }
  .pm-name:hover { text-decoration: underline; }
  .pm-rename-input { flex: 1; font-size: 12.5px; padding: 3px 5px; min-width: 60px; }
  .preset-menu-empty { padding: 8px 10px; color: var(--text-dim); font-size: 12px; white-space: nowrap; }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    background: var(--panel-bg);
  }
  .tool {
    width: 30px; height: 26px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 3px;
    color: var(--text);
    cursor: pointer;
    position: relative;
  }
  .tool:hover { background: var(--btn-hover); border-color: var(--border-light); }
  .tool:active { background: var(--btn-active); }
  .tool svg { width: 16px; height: 16px; display: block; }
  .tool[disabled] { opacity: .35; cursor: default; }
  .tool[disabled]:hover { background: transparent; border-color: transparent; }
  .tool::after {
    content: attr(data-tip);
    position: absolute;
    top: 110%;
    left: 0;
    background: var(--tooltip-bg);
    border: 1px solid var(--border-light);
    color: var(--text);
    font-size: 11px;
    padding: 3px 7px;
    border-radius: 3px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity .12s;
    z-index: 30;
  }
  .tool:hover::after { opacity: 1; }
  #indentBtn::after, #outdentBtn::after, #themeToggle::after { left: auto; right: 0; }
  .tool-sep { width: 1px; height: 18px; background: var(--border-light); margin: 0 5px; }

  /* Table */
  .grid-head, .row {
    display: grid;
    grid-template-columns: var(--cols, minmax(0,1fr) 56px 118px 96px);
    align-items: center;
  }
  .grid-head {
    position: relative;
    padding: 7px 10px 7px 12px;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .6px;
    border-bottom: 1px solid var(--border);
    background: var(--panel-bg-deep);
    user-select: none;
  }
  .grid-head span:not(:first-child) { text-align: center; }
  .grid-head span { overflow: hidden; white-space: nowrap; min-width: 0; padding: 0 6px; }
  .grid-head span:first-child { padding-left: 0; }
  .grid-head span:nth-child(3), .grid-head span:nth-child(4) { text-align: left; }
  .col-resizer {
    position: absolute;
    top: 0;
    height: 100%;
    width: 9px;
    transform: translateX(-50%);
    cursor: col-resize;
    z-index: 5;
  }
  .col-resizer::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 4px;
    bottom: 4px;
    width: 1px;
    background: var(--border-light);
    transform: translateX(-50%);
  }
  .col-resizer:hover::before, .col-resizer.active::before {
    background: var(--accent);
    width: 2px;
  }
  body.col-resizing { cursor: col-resize; user-select: none; }
  .rows {
    flex: 1;
    min-height: 200px;
    overflow-y: auto;
    overflow-x: hidden;
    background: var(--list-bg);
  }
  .rows::-webkit-scrollbar { width: 10px; }
  .rows::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 5px; }
  .rows::-webkit-scrollbar-track { background: var(--panel-bg-deep); }

  .row {
    padding: 3px 10px 3px 6px;
    border-bottom: 1px solid var(--row-line);
    cursor: default;
    user-select: none;
  }
  .row:hover { background: var(--row-hover); }
  .row.selected {
    background: var(--row-selected);
    box-shadow: inset 0 0 0 1px var(--row-selected-border);
  }
  .row.dragging { opacity: .4; }
  .row.drop-into {
    box-shadow: inset 0 0 0 2px var(--accent);
    background: var(--drop-tint);
  }
  .row.drop-before { box-shadow: inset 0 3px 0 0 var(--accent); }
  .row.drop-after { box-shadow: inset 0 -3px 0 0 var(--accent); }
  .name-cell { display: flex; align-items: center; min-width: 0; }
  .twisty {
    width: 18px; height: 18px;
    flex: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 2px;
  }
  .twisty:hover { color: var(--text); background: var(--ghost-hover); }
  .twisty svg { transition: transform .12s; }
  .twisty.open svg { transform: rotate(90deg); }
  .twisty.leaf { visibility: hidden; cursor: default; }
  .layer-name {
    padding: 2px 5px;
    border-radius: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .layer-name-input {
    font-size: 13px;
    padding: 1px 4px;
    width: 100%;
    min-width: 60px;
  }
  .child-count { color: var(--text-dim); font-size: 10.5px; margin-left: 5px; flex: none; }

  .swatch-cell, .lt-cell, .pw-cell { display: flex; justify-content: center; }
  .lt-cell, .pw-cell {
    justify-content: flex-start;
    overflow: hidden;
    min-width: 0;
    padding-left: 6px;
  }
  .swatch {
    width: 20px; height: 14px;
    border: 1px solid #0c0c0e;
    box-shadow: inset 0 0 0 1px var(--swatch-inset);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  .swatch input[type="color"] {
    position: absolute; inset: 0;
    opacity: 0;
    width: 100%; height: 100%;
    cursor: pointer;
    border: none; padding: 0;
  }
  .mini-select {
    font-size: 11.5px;
    padding: 2px 3px;
    max-width: 112px;
    width: 100%;
  }
  .pw-cell .mini-select { max-width: 88px; font-family: var(--mono); }

  /* Custom dropdowns with visual previews */
  .dd-trigger {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border-light);
    border-radius: 3px;
    padding: 2px 6px;
    font-size: 11.5px;
    font-family: var(--font);
    cursor: pointer;
    width: max-content;
    min-width: 0;
    max-width: none;
    height: 22px;
    flex: none;
  }
  .dd-trigger:hover { background: var(--input-hover); }
  .dd-trigger:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .dd-label {
    flex: none;
    white-space: nowrap;
    text-align: left;
  }
  .dd-caret { flex: none; opacity: .65; }
  .dd-pop {
    position: fixed;
    z-index: 200;
    background: var(--menu-bg);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    box-shadow: 0 10px 30px rgba(0,0,0,.55);
    padding: 5px;
    max-height: 420px;
    overflow-y: auto;
    width: max-content;
  }
  .dd-item {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 4px 9px;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
    border-radius: 3px;
    text-align: left;
  }
  .dd-item:hover { background: var(--hover-bg); }
  .dd-item.current { background: var(--row-selected); }
  .dd-item svg { flex: none; }
  .dd-item .dd-item-label { flex: none; white-space: nowrap; }

  /* Linetype preview line inside select option isn't possible; draw preview next to select on selected row only — keep simple. */

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12.5px;
  }

  /* Status bar */
  .statusbar {
    display: flex;
    gap: 14px;
    padding: 6px 12px;
    font-size: 11.5px;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
    background: var(--panel-bg-deep);
    white-space: nowrap;
    overflow: hidden;
  }
  .statusbar #countInfo { flex: none; }
  .statusbar .statusbar-hint { flex: none; }
  .statusbar .flash {
    transition: opacity .4s;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  /* Layer/action feedback — blue, takes the flexible middle */
  .statusbar .action-flash {
    color: var(--accent);
    margin-left: auto;
    min-width: 0;
    text-align: right;
  }
  /* Save feedback — green (success) / red (error), pinned to the far right */
  .statusbar .save-flash {
    flex: none;
    max-width: 45%;
    color: #3f9a55;
  }
  body:not(.light) .statusbar .save-flash { color: #6cc07f; }
  .statusbar .save-flash.err { color: var(--danger); }
  @media (max-width: 620px) {
    .statusbar .statusbar-hint { display: none; }
  }

  /* Modal */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--panel-bg);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    padding: 18px;
    width: min(360px, 90vw);
    box-shadow: 0 12px 40px rgba(0,0,0,.6);
  }
  .modal h3 { font-size: 14px; margin-bottom: 8px; }
  .modal p { color: var(--text-dim); font-size: 12.5px; margin-bottom: 14px; line-height: 1.45; }
  .modal .actions { display: flex; justify-content: flex-end; gap: 8px; }

  @media (max-width: 560px) {
    .mini-select { max-width: 92px; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>

<script>
(function () {
  "use strict";

  const LINETYPES = ["Continuous", "Border", "Center", "DashDot", "Dashed", "Dots", "Hidden"];
  let PRINT_WIDTHS = ["Default", "No Print", "Hairline", "0.13", "0.18", "0.25", "0.30", "0.35", "0.50", "0.70", "1.00", "1.40", "2.00"];
  function ensurePrintWidth(label) {
    if (PRINT_WIDTHS.includes(label)) return label;
    const num = parseFloat(label);
    if (isNaN(num)) return "Default";
    // insert in numeric order after the named entries
    let at = PRINT_WIDTHS.length;
    for (let i = 3; i < PRINT_WIDTHS.length; i++) {
      if (parseFloat(PRINT_WIDTHS[i]) > num) { at = i; break; }
    }
    PRINT_WIDTHS.splice(at, 0, label);
    return label;
  }
  const STORAGE_KEY = "rhino-layer-emulator-presets";
  const DEFAULT_PRESET_KEY = "rhino-layer-emulator-default-preset";

  let uid = 0;
  const newId = () => "L" + (++uid) + "_" + Date.now().toString(36);

  function makeLayer(name, overrides) {
    return Object.assign({
      id: newId(),
      name: name,
      color: "#000000",
      linetype: "Continuous",
      printWidth: "Default",
      expanded: true,
      guid: null,   // Rhino layer GUID (assigned on import or at export)
      rhino: null,  // full original Rhino record, preserved for round-trip export
      children: []
    }, overrides || {});
  }

  // ---- State ----
  let root = { id: "ROOT", children: [makeLayer("Default")] };
  let selectedId = root.children[0].id;
  let editingId = null;
  let presets = {}; // name -> serialized tree
  let defaultPresetName = null; // shared startup preset (loads on refresh)
  let layerCounter = 0;
  let dragId = null;

  // ---- Auto-save state ----
  let linkedPresetName = null;   // the preset the current table is bound to (null = scratch)
  let autosaveEnabled = false;   // session toggle (default off); edits write back to the linked preset
  let autosaveTimer = null;

  // ---- Tree helpers ----
  function findWithParent(node, id, parent) {
    if (node.id === id) return { node, parent };
    for (const c of node.children) {
      const hit = findWithParent(c, id, node);
      if (hit) return hit;
    }
    return null;
  }
  const find = (id) => (id ? findWithParent(root, id, null) : null);

  function countAll(node) {
    return node.children.reduce((n, c) => n + 1 + countAll(c), 0);
  }
  function flatten(node, depth, out) {
    for (const c of node.children) {
      out.push({ layer: c, depth });
      if (c.children.length && c.expanded) flatten(c, depth + 1, out);
    }
    return out;
  }

  function serializeTree() {
    const strip = (n) => ({
      name: n.name, color: n.color, linetype: n.linetype,
      printWidth: n.printWidth, expanded: n.expanded,
      guid: n.guid || null, rhino: n.rhino || null,
      children: n.children.map(strip)
    });
    return root.children.map(strip);
  }
  function hydrateTree(arr) {
    const build = (n) => makeLayer(n.name || "Layer", {
      color: n.color || "#000000",
      linetype: LINETYPES.includes(n.linetype) ? n.linetype : "Continuous",
      printWidth: ensurePrintWidth(n.printWidth || "Default"),
      expanded: n.expanded !== false,
      guid: n.guid || null,
      rhino: n.rhino || null,
      children: Array.isArray(n.children) ? n.children.map(build) : []
    });
    root = { id: "ROOT", children: (arr || []).map(build) };
    selectedId = root.children.length ? root.children[0].id : null;
  }

  // ---- Persistence (best-effort; falls back to in-memory) ----
  // ---- Persistence: server API first, then window.storage, else in-memory ----
  let apiMode = false;
  async function loadPresets() {
    try {
      const r = await fetch("api/presets");
      if (r.ok) {
        const j = await r.json();
        presets = (j && j.presets) || {};
        apiMode = true;
        renderPresetSelect();
        return;
      }
    } catch (e) { /* no server — fall through */ }
    try {
      if (window.storage && window.storage.get) {
        const res = await window.storage.get(STORAGE_KEY);
        if (res && res.value) presets = JSON.parse(res.value) || {};
      }
    } catch (e) { /* key missing or storage unavailable — in-memory only */ }
    renderPresetSelect();
  }
  async function persistPresets() {
    try {
      if (window.storage && window.storage.set) {
        await window.storage.set(STORAGE_KEY, JSON.stringify(presets));
      }
    } catch (e) { /* in-memory only */ }
  }
  async function persistPresetOne(name) {
    if (apiMode) {
      try {
        const r = await fetch("api/presets/" + encodeURIComponent(name), {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ tree: presets[name] })
        });
        if (!r.ok) { saySave("Server rejected the save (" + r.status + ")", true, 5000); return false; }
        return true;
      } catch (e) { saySave("Couldn't reach the server — saved locally only", true, 5000); return false; }
    }
    persistPresets();
    return true;
  }
  async function removePresetOne(name) {
    if (apiMode) {
      try {
        await fetch("api/presets/" + encodeURIComponent(name), { method: "DELETE" });
      } catch (e) { say("Couldn't reach the server — removed locally only", 5000); }
      return;
    }
    persistPresets();
  }

  // ---- Auto-save engine ----
  // Binds the current table to a preset; edits then write back to it (debounced).
  // Feedback is transient: a brief flash confirms each save (no persistent chip).
  function setLinkedPreset(name) {
    linkedPresetName = name || null;
    clearTimeout(autosaveTimer);
    if (!linkedPresetName) autosaveEnabled = false; // nothing to auto-save to
    updateAutosaveToggle();
  }
  // Called by every layer mutation. Schedules a debounced write to the linked preset.
  function markDirty() {
    if (!linkedPresetName || !autosaveEnabled) return;
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(flushAutosave, 700);
  }
  async function flushAutosave() {
    if (!linkedPresetName || !autosaveEnabled) return;
    const name = linkedPresetName;
    presets[name] = serializeTree();
    const ok = await persistPresetOne(name); // flashes its own error on failure
    if (ok && linkedPresetName === name) saySave("Saved to “" + name + "” ✓");
  }
  function updateAutosaveToggle() {
    if (!autosaveToggle) return;
    const linked = !!linkedPresetName;
    autosaveToggle.disabled = !linked; // can't arm auto-save with no preset to save to
    autosaveToggle.checked = autosaveEnabled;
    const sw = autosaveToggle.closest(".switch");
    if (sw) {
      sw.classList.toggle("disabled", !linked);
      sw.title = linked
        ? "Auto-save edits back to the loaded preset. Turn off to experiment without changing it."
        : "Load or save a preset first to enable auto-save.";
    }
  }
  function toggleAutosave() {
    if (!linkedPresetName) { autosaveToggle.checked = false; autosaveEnabled = false; return; }
    autosaveEnabled = autosaveToggle.checked;
    if (autosaveEnabled) {
      flushAutosave(); // saves current state + flashes "Saved …" on success
    } else {
      clearTimeout(autosaveTimer);
      say("Auto-save paused — changes won’t be saved");
    }
  }

  // ---- Shared startup default preset ----
  async function loadDefaultPreset() {
    if (apiMode) {
      try {
        const r = await fetch("api/default-preset");
        if (r.ok) { const j = await r.json(); defaultPresetName = (j && j.name) || null; }
      } catch (e) { /* leave null */ }
      return;
    }
    try {
      if (window.storage && window.storage.get) {
        const res = await window.storage.get(DEFAULT_PRESET_KEY);
        if (res && res.value) defaultPresetName = res.value;
      }
    } catch (e) { /* leave null */ }
  }
  async function persistDefaultPreset() {
    if (apiMode) {
      try {
        const r = await fetch("api/default-preset", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: defaultPresetName })
        });
        if (!r.ok) say("Server rejected the default (" + r.status + ")", 5000);
      } catch (e) { say("Couldn't reach the server — default not saved", 5000); }
      return;
    }
    try {
      if (window.storage && window.storage.set) {
        await window.storage.set(DEFAULT_PRESET_KEY, defaultPresetName || "");
      }
    } catch (e) { /* in-memory only */ }
  }

  // ---- DOM refs ----
  const rowsEl = document.getElementById("rows");
  const countInfo = document.getElementById("countInfo");
  const flash = document.getElementById("flash");
  const saveFlash = document.getElementById("saveFlash");
  const presetCombo = document.getElementById("presetCombo");
  const presetTrigger = document.getElementById("presetTrigger");
  const presetTriggerLabel = document.getElementById("presetTriggerLabel");
  const presetNameInput = document.getElementById("presetName");
  const autosaveToggle = document.getElementById("autosaveToggle");
  let selectedPresetName = null; // which preset Load/Delete act on
  const overlay = document.getElementById("overlay");
  const modalTitle = document.getElementById("modalTitle");
  const modalBody = document.getElementById("modalBody");
  const modalConfirm = document.getElementById("modalConfirm");
  const modalCancel = document.getElementById("modalCancel");

  // Two independent feedback channels so layer-action and save messages don't
  // overwrite each other: say() = blue action flash, saySave() = green/red save flash.
  let flashTimer = null;
  function say(msg, ms) {
    flash.textContent = msg;
    flash.style.opacity = "1";
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => { flash.style.opacity = "0"; }, ms || 2200);
  }
  let saveFlashTimer = null;
  function saySave(msg, isError, ms) {
    saveFlash.textContent = msg;
    saveFlash.classList.toggle("err", !!isError);
    saveFlash.style.opacity = "1";
    clearTimeout(saveFlashTimer);
    saveFlashTimer = setTimeout(() => { saveFlash.style.opacity = "0"; }, ms || 2200);
  }

  let confirmCb = null;
  function askConfirm(title, body, cb) {
    modalTitle.textContent = title;
    modalBody.textContent = body;
    confirmCb = cb;
    overlay.classList.add("show");
    modalConfirm.focus();
  }
  modalConfirm.addEventListener("click", () => {
    overlay.classList.remove("show");
    if (confirmCb) confirmCb();
    confirmCb = null;
  });
  modalCancel.addEventListener("click", () => {
    overlay.classList.remove("show");
    confirmCb = null;
  });

  // ---- Rendering ----
  function render() {
    rowsEl.innerHTML = "";
    const flat = flatten(root, 0, []);
    if (!flat.length) {
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "No layers. Use the first toolbar button to add one and start drafting your standard.";
      rowsEl.appendChild(empty);
    }
    for (const { layer, depth } of flat) {
      rowsEl.appendChild(renderRow(layer, depth));
    }
    const total = countAll(root);
    countInfo.textContent = total + " layer" + (total === 1 ? "" : "s");
    if (typeof positionResizers === "function") positionResizers();
  }

  function renderRow(layer, depth) {
    const row = document.createElement("div");
    row.className = "row" + (layer.id === selectedId ? " selected" : "");
    row.dataset.id = layer.id;

    // Drag & drop
    row.draggable = editingId !== layer.id;
    row.addEventListener("dragstart", (e) => {
      if (e.target.closest && e.target.closest("select, input, button")) { e.preventDefault(); return; }
      dragId = layer.id;
      e.dataTransfer.setData("text/plain", layer.id);
      e.dataTransfer.effectAllowed = "move";
      requestAnimationFrame(() => row.classList.add("dragging"));
    });
    row.addEventListener("dragover", (e) => {
      if (!canDrop(layer.id)) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      const rect = row.getBoundingClientRect();
      const y = e.clientY - rect.top;
      row.classList.remove("drop-into", "drop-before", "drop-after");
      if (y < rect.height * 0.25) row.classList.add("drop-before");
      else if (y > rect.height * 0.75) row.classList.add("drop-after");
      else row.classList.add("drop-into");
    });
    row.addEventListener("dragleave", () => {
      row.classList.remove("drop-into", "drop-before", "drop-after");
    });
    row.addEventListener("drop", (e) => {
      e.preventDefault();
      e.stopPropagation();
      let mode = "into";
      if (row.classList.contains("drop-before")) mode = "before";
      else if (row.classList.contains("drop-after")) mode = "after";
      clearAllDropMarkers();
      dropOn(layer.id, mode);
      dragId = null;
    });
    row.addEventListener("dragend", () => {
      row.classList.remove("dragging");
      clearAllDropMarkers();
      dragId = null;
    });

    // Name cell
    const nameCell = document.createElement("div");
    nameCell.className = "name-cell";
    nameCell.style.paddingLeft = (depth * 18) + "px";

    const twisty = document.createElement("span");
    twisty.className = "twisty" + (layer.children.length ? (layer.expanded ? " open" : "") : " leaf");
    twisty.innerHTML = '<svg viewBox="0 0 16 16" width="10" height="10" fill="currentColor"><path d="M5 3l6 5-6 5z"/></svg>';
    // Stop mousedown from bubbling to the row's select handler — otherwise the
    // row re-renders and replaces this element mid-click, so expand/collapse
    // only takes effect on the second click when the layer isn't selected yet.
    twisty.addEventListener("mousedown", (e) => e.stopPropagation());
    twisty.addEventListener("click", (e) => {
      e.stopPropagation();
      layer.expanded = !layer.expanded;
      render();
    });
    nameCell.appendChild(twisty);

    if (editingId === layer.id) {
      const input = document.createElement("input");
      input.type = "text";
      input.className = "layer-name-input";
      input.value = layer.name;
      const commit = () => {
        const v = input.value.trim();
        const changed = v && v !== layer.name;
        if (v) layer.name = v;
        editingId = null;
        render();
        if (changed) markDirty();
      };
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") commit();
        if (e.key === "Escape") { editingId = null; render(); }
      });
      input.addEventListener("blur", commit);
      nameCell.appendChild(input);
      setTimeout(() => { input.focus(); input.select(); }, 0);
    } else {
      const nameSpan = document.createElement("span");
      nameSpan.className = "layer-name";
      nameSpan.textContent = layer.name;
      nameSpan.addEventListener("dblclick", (e) => {
        e.stopPropagation();
        editingId = layer.id;
        selectedId = layer.id;
        render();
      });
      nameCell.appendChild(nameSpan);
      if (layer.children.length && !layer.expanded) {
        const cc = document.createElement("span");
        cc.className = "child-count";
        cc.textContent = "(" + layer.children.length + ")";
        nameCell.appendChild(cc);
      }
    }

    // Color cell
    const swatchCell = document.createElement("div");
    swatchCell.className = "swatch-cell";
    const swatch = document.createElement("span");
    swatch.className = "swatch";
    swatch.style.background = layer.color;
    const colorInput = document.createElement("input");
    colorInput.type = "color";
    colorInput.value = layer.color;
    colorInput.addEventListener("input", () => {
      layer.color = colorInput.value;
      swatch.style.background = layer.color;
      markDirty();
    });
    // Stop mousedown from bubbling to the row's select handler — otherwise the
    // row re-renders and replaces this input mid-click, so the picker only opens
    // on the second click (like the linetype/print-width controls already do).
    colorInput.addEventListener("mousedown", (e) => e.stopPropagation());
    colorInput.addEventListener("click", (e) => e.stopPropagation());
    swatch.appendChild(colorInput);
    swatchCell.appendChild(swatch);

    // Linetype cell
    const ltCell = document.createElement("div");
    ltCell.className = "lt-cell";
    const ltBtn = document.createElement("button");
    ltBtn.type = "button";
    ltBtn.className = "dd-trigger";
    ltBtn.dataset.ddId = layer.id + ":lt";
    ltBtn.title = layer.linetype;
    ltBtn.innerHTML = ltPreviewSVG(layer.linetype, 20) + '<span class="dd-label">' + layer.linetype + '</span>' + CARET;
    ltBtn.addEventListener("mousedown", (e) => e.stopPropagation());
    ltBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      openDropdown(ltBtn, LINETYPES, layer.linetype,
        (v) => ltPreviewSVG(v, 48),
        (v) => { layer.linetype = v; render(); markDirty(); });
    });
    ltCell.appendChild(ltBtn);

    // Print width cell
    const pwCell = document.createElement("div");
    pwCell.className = "pw-cell";
    const pwBtn = document.createElement("button");
    pwBtn.type = "button";
    pwBtn.className = "dd-trigger";
    pwBtn.dataset.ddId = layer.id + ":pw";
    pwBtn.title = layer.printWidth;
    pwBtn.innerHTML = '<span class="dd-label">' + layer.printWidth + '</span>' + CARET;
    pwBtn.addEventListener("mousedown", (e) => e.stopPropagation());
    pwBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      openDropdown(pwBtn, PRINT_WIDTHS, layer.printWidth,
        (v) => pwPreviewSVG(v, 44),
        (v) => { layer.printWidth = v; render(); markDirty(); },
        "pw");
    });
    pwCell.appendChild(pwBtn);

    row.appendChild(nameCell);
    row.appendChild(swatchCell);
    row.appendChild(ltCell);
    row.appendChild(pwCell);

    row.addEventListener("mousedown", () => {
      if (selectedId !== layer.id) {
        selectedId = layer.id;
        if (editingId && editingId !== layer.id) editingId = null;
        render();
      }
    });
    return row;
  }

  // ---- Layer operations ----
  function nextLayerName() {
    layerCounter += 1;
    return "Layer " + String(layerCounter).padStart(2, "0");
  }

  function addLayer() {
    const layer = makeLayer(nextLayerName());
    const hit = find(selectedId);
    if (hit && hit.parent) {
      const siblings = hit.parent.children;
      siblings.splice(siblings.indexOf(hit.node) + 1, 0, layer);
    } else {
      root.children.push(layer);
    }
    selectedId = layer.id;
    editingId = layer.id;
    render();
    markDirty();
  }

  function addChild() {
    const hit = find(selectedId);
    if (!hit || !hit.parent) { addLayer(); return; }
    const layer = makeLayer(nextLayerName());
    hit.node.children.push(layer);
    hit.node.expanded = true;
    selectedId = layer.id;
    editingId = layer.id;
    render();
    markDirty();
  }

  function deleteSelected() {
    const hit = find(selectedId);
    if (!hit || !hit.parent) return;
    const doDelete = () => {
      const siblings = hit.parent.children;
      const idx = siblings.indexOf(hit.node);
      siblings.splice(idx, 1);
      const next = siblings[idx] || siblings[idx - 1];
      selectedId = next ? next.id : (hit.parent.id !== "ROOT" ? hit.parent.id : null);
      render();
      markDirty();
      say("Deleted “" + hit.node.name + "”");
    };
    const kids = countAll(hit.node);
    if (kids > 0) {
      askConfirm(
        "Delete layer and sublayers?",
        "“" + hit.node.name + "” has " + kids + " sublayer" + (kids === 1 ? "" : "s") + ". Deleting it removes them all.",
        doDelete
      );
    } else {
      doDelete();
    }
  }

  function moveSelected(dir) {
    const hit = find(selectedId);
    if (!hit || !hit.parent) return;
    const siblings = hit.parent.children;
    const idx = siblings.indexOf(hit.node);
    const to = idx + dir;
    if (to < 0 || to >= siblings.length) return;
    siblings.splice(idx, 1);
    siblings.splice(to, 0, hit.node);
    render();
    markDirty();
  }

  function indentSelected() {
    const hit = find(selectedId);
    if (!hit || !hit.parent) return;
    const siblings = hit.parent.children;
    const idx = siblings.indexOf(hit.node);
    if (idx === 0) { say("No layer above at this level"); return; }
    const newParent = siblings[idx - 1];
    siblings.splice(idx, 1);
    newParent.children.push(hit.node);
    newParent.expanded = true;
    render();
    markDirty();
  }

  function outdentSelected() {
    const hit = find(selectedId);
    if (!hit || !hit.parent || hit.parent.id === "ROOT") return;
    const parentHit = findWithParent(root, hit.parent.id, null);
    const grandSiblings = parentHit.parent.children;
    hit.parent.children.splice(hit.parent.children.indexOf(hit.node), 1);
    grandSiblings.splice(grandSiblings.indexOf(hit.parent) + 1, 0, hit.node);
    render();
    markDirty();
  }

  // ---- Drag & drop (Rhino-style reparenting) ----
  function isInSubtree(node, id) {
    if (node.id === id) return true;
    return node.children.some((c) => isInSubtree(c, id));
  }
  function canDrop(targetId) {
    if (!dragId || dragId === targetId) return false;
    const hit = find(dragId);
    return hit ? !isInSubtree(hit.node, targetId) : false;
  }
  function clearAllDropMarkers() {
    rowsEl.querySelectorAll(".drop-into, .drop-before, .drop-after").forEach((el) => {
      el.classList.remove("drop-into", "drop-before", "drop-after");
    });
  }
  function dropOn(targetId, mode) {
    if (!canDrop(targetId)) return;
    const dragHit = find(dragId);
    dragHit.parent.children.splice(dragHit.parent.children.indexOf(dragHit.node), 1);
    const targetHit = find(targetId);
    if (!targetHit) {
      root.children.push(dragHit.node);
    } else if (mode === "into") {
      targetHit.node.children.push(dragHit.node);
      targetHit.node.expanded = true;
      say("Nested “" + dragHit.node.name + "” under “" + targetHit.node.name + "”");
    } else {
      const sibs = targetHit.parent.children;
      const idx = sibs.indexOf(targetHit.node) + (mode === "after" ? 1 : 0);
      sibs.splice(idx, 0, dragHit.node);
    }
    selectedId = dragHit.node.id;
    render();
    markDirty();
  }

  // ---- Custom dropdowns with previews ----
  const LT_DASH = {
    "Continuous": "",
    "Border":     "9 3 9 3 1.5 3",
    "Center":     "11 3 4 3",
    "DashDot":    "8 3 1.5 3",
    "Dashed":     "6 3",
    "Dots":       "0.1 3.4",
    "Hidden":     "4 2"
  };
  function ltPreviewSVG(name, w) {
    const dash = LT_DASH[name] || "";
    return '<svg width="' + w + '" height="8" viewBox="0 0 ' + w + ' 8" aria-hidden="true">' +
      '<line x1="1" y1="4" x2="' + (w - 1) + '" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"' +
      (dash ? ' stroke-dasharray="' + dash + '"' : '') + '/></svg>';
  }
  function pwPreviewSVG(name, w) {
    if (name === "No Print") {
      return '<svg width="' + w + '" height="10" viewBox="0 0 ' + w + ' 10" aria-hidden="true">' +
        '<line x1="1" y1="5" x2="' + (w - 1) + '" y2="5" stroke="currentColor" stroke-opacity=".3" stroke-width="1" stroke-dasharray="2 3"/></svg>';
    }
    let sw;
    if (name === "Default") sw = 1.2;
    else if (name === "Hairline") sw = 0.6;
    else sw = Math.min(8.5, parseFloat(name) * 3.4);
    return '<svg width="' + w + '" height="10" viewBox="0 0 ' + w + ' 10" aria-hidden="true">' +
      '<line x1="1" y1="5" x2="' + (w - 1) + '" y2="5" stroke="currentColor" stroke-width="' + sw + '"/></svg>';
  }
  const CARET = '<svg class="dd-caret" width="8" height="8" viewBox="0 0 8 8" fill="currentColor" aria-hidden="true"><path d="M1 2.5h6L4 6z"/></svg>';

  let openPop = null;
  function closeDropdown() {
    if (!openPop) return;
    openPop.remove();
    openPop = null;
    document.removeEventListener("mousedown", onDocMouseDown, true);
  }
  function onDocMouseDown(e) {
    // Ignore clicks on the preset trigger so it can toggle its own menu.
    if (e.target.closest && e.target.closest("#presetTrigger")) return;
    if (openPop && !openPop.contains(e.target)) closeDropdown();
  }
  function openDropdown(trigger, values, current, renderItem, onSelect, popClass) {
    if (openPop && openPop.dataset.owner === trigger.dataset.ddId) { closeDropdown(); return; }
    closeDropdown();
    const pop = document.createElement("div");
    pop.className = "dd-pop" + (popClass ? " " + popClass : "");
    pop.dataset.owner = trigger.dataset.ddId || "";
    for (const v of values) {
      const item = document.createElement("button");
      item.type = "button";
      item.className = "dd-item" + (v === current ? " current" : "");
      item.innerHTML = renderItem(v) + '<span class="dd-item-label">' + v + '</span>';
      item.addEventListener("mousedown", (e) => e.stopPropagation());
      item.addEventListener("click", () => { closeDropdown(); onSelect(v); });
      pop.appendChild(item);
    }
    document.body.appendChild(pop);
    const r = trigger.getBoundingClientRect();
    pop.style.minWidth = r.width + "px";
    let top = r.bottom + 3;
    if (top + pop.offsetHeight > window.innerHeight - 8) {
      top = Math.max(8, r.top - pop.offsetHeight - 3);
    }
    let left = r.left;
    if (left + pop.offsetWidth > window.innerWidth - 8) {
      left = Math.max(8, window.innerWidth - 8 - pop.offsetWidth);
    }
    pop.style.top = top + "px";
    pop.style.left = left + "px";
    openPop = pop;
    const cur = pop.querySelector(".dd-item.current");
    if (cur) cur.scrollIntoView({ block: "nearest" });
    setTimeout(() => document.addEventListener("mousedown", onDocMouseDown, true), 0);
  }

  // ---- Presets ----
  function presetNames() {
    return Object.keys(presets).sort((a, b) => a.localeCompare(b));
  }

  // Refresh the trigger label + keep the current selection valid.
  // (The star/rename controls live inside the menu itself.)
  function renderPresetSelect() {
    const names = presetNames();
    if (selectedPresetName && !presets[selectedPresetName]) selectedPresetName = null;
    if (!selectedPresetName && names.length) {
      selectedPresetName = (defaultPresetName && presets[defaultPresetName]) ? defaultPresetName : names[0];
    }
    if (!names.length) {
      presetTriggerLabel.textContent = "— no presets yet —";
    } else {
      presetTriggerLabel.textContent = (selectedPresetName === defaultPresetName ? "★ " : "") + selectedPresetName;
    }
    if (openPop && openPop.dataset.owner === "preset") renderPresetMenu();
  }

  const PENCIL_SVG = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.4 2.6l2 2L6 12l-2.7.7L4 10z"/><path d="M10.2 3.8l2 2"/></svg>';

  function renderPresetMenu() {
    if (!openPop || openPop.dataset.owner !== "preset") return;
    const pop = openPop;
    pop.innerHTML = "";
    const names = presetNames();
    if (!names.length) {
      const e = document.createElement("div");
      e.className = "preset-menu-empty";
      e.textContent = "No presets saved yet.";
      pop.appendChild(e);
      return;
    }
    for (const name of names) {
      const row = document.createElement("div");
      row.className = "preset-menu-row" + (name === selectedPresetName ? " current" : "");

      // Star → toggle the shared startup default (stays open so you can see it)
      const isDef = name === defaultPresetName;
      const star = document.createElement("button");
      star.type = "button";
      star.className = "pm-star" + (isDef ? " on" : "");
      star.textContent = isDef ? "★" : "☆";
      star.title = isDef ? "Loads on startup — click to unset" : "Set as the startup default (shared with everyone)";
      star.addEventListener("mousedown", (e) => e.stopPropagation());
      star.addEventListener("click", (e) => {
        e.stopPropagation();
        setDefaultPreset(isDef ? null : name);
        renderPresetMenu();
      });
      row.appendChild(star);

      // Name → select this preset for Load/Delete, then close
      const nameBtn = document.createElement("button");
      nameBtn.type = "button";
      nameBtn.className = "pm-name";
      nameBtn.textContent = name;
      nameBtn.title = "Select “" + name + "”";
      nameBtn.addEventListener("mousedown", (e) => e.stopPropagation());
      nameBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        selectedPresetName = name;
        renderPresetSelect();
        closeDropdown();
      });
      row.appendChild(nameBtn);

      // Pencil → rename inline
      const ren = document.createElement("button");
      ren.type = "button";
      ren.className = "pm-rename";
      ren.innerHTML = PENCIL_SVG;
      ren.title = "Rename “" + name + "”";
      ren.addEventListener("mousedown", (e) => e.stopPropagation());
      ren.addEventListener("click", (e) => {
        e.stopPropagation();
        beginRenameInMenu(row, name);
      });
      row.appendChild(ren);

      pop.appendChild(row);
    }
  }

  function beginRenameInMenu(row, oldName) {
    const nameBtn = row.querySelector(".pm-name");
    if (!nameBtn) return;
    const input = document.createElement("input");
    input.type = "text";
    input.className = "pm-rename-input";
    input.value = oldName;
    const commit = () => {
      const v = input.value.trim();
      if (!v || v === oldName) { renderPresetMenu(); return; }
      if (presets[v]) { say("A preset named “" + v + "” already exists"); input.focus(); input.select(); return; }
      renamePreset(oldName, v);
    };
    input.addEventListener("mousedown", (e) => e.stopPropagation());
    input.addEventListener("click", (e) => e.stopPropagation());
    input.addEventListener("keydown", (e) => {
      e.stopPropagation();
      if (e.key === "Enter") { e.preventDefault(); commit(); }
      else if (e.key === "Escape") { e.preventDefault(); renderPresetMenu(); }
    });
    row.replaceChild(input, nameBtn);
    setTimeout(() => { input.focus(); input.select(); }, 0);
  }

  function openPresetMenu() {
    if (openPop && openPop.dataset.owner === "preset") { closeDropdown(); return; }
    closeDropdown();
    const pop = document.createElement("div");
    pop.className = "dd-pop preset-pop";
    pop.dataset.owner = "preset";
    openPop = pop;
    document.body.appendChild(pop);
    renderPresetMenu();
    const r = presetTrigger.getBoundingClientRect();
    pop.style.minWidth = Math.max(240, r.width) + "px";
    let top = r.bottom + 3;
    if (top + pop.offsetHeight > window.innerHeight - 8) top = Math.max(8, r.top - pop.offsetHeight - 3);
    let left = r.left;
    if (left + pop.offsetWidth > window.innerWidth - 8) left = Math.max(8, window.innerWidth - 8 - pop.offsetWidth);
    pop.style.top = top + "px";
    pop.style.left = left + "px";
    const cur = pop.querySelector(".preset-menu-row.current");
    if (cur) cur.scrollIntoView({ block: "nearest" });
    setTimeout(() => document.addEventListener("mousedown", onDocMouseDown, true), 0);
  }

  function setDefaultPreset(name) {
    if (name && !presets[name]) return;
    if (defaultPresetName === (name || null)) return;
    defaultPresetName = name || null;
    persistDefaultPreset();
    renderPresetSelect();
    say(name ? "“" + name + "” will load on startup for everyone" : "Startup default cleared");
  }

  async function renamePreset(oldName, newName) {
    if (!presets[oldName] || presets[newName]) return;
    presets[newName] = presets[oldName];
    delete presets[oldName];
    const wasDefault = defaultPresetName === oldName;
    if (wasDefault) defaultPresetName = newName;
    if (selectedPresetName === oldName) selectedPresetName = newName;
    if (linkedPresetName === oldName) linkedPresetName = newName;
    // Save the new name and promote the default BEFORE deleting the old one, so
    // the server's "clear default on delete" never wipes a still-wanted default.
    await persistPresetOne(newName);
    if (wasDefault) await persistDefaultPreset();
    await removePresetOne(oldName);
    renderPresetSelect();
    say("Renamed to “" + newName + "”");
  }

  // Inline save: the Save button turns the combobox into a name field in place
  // (the dropdown menu never opens), Enter commits, Esc cancels.
  function beginInlineSave() {
    if (presetCombo.classList.contains("naming")) { presetNameInput.focus(); return; }
    closeDropdown();
    presetCombo.classList.add("naming");
    presetTrigger.style.display = "none";
    presetNameInput.style.display = "";
    presetNameInput.value = "";
    setTimeout(() => presetNameInput.focus(), 0);
  }
  function endInlineSave() {
    if (!presetCombo.classList.contains("naming")) return;
    presetCombo.classList.remove("naming");
    presetNameInput.style.display = "none";
    presetNameInput.value = "";
    presetTrigger.style.display = "";
  }
  function commitInlineSave() {
    const name = presetNameInput.value.trim();
    if (!name) { endInlineSave(); return; }
    const write = () => {
      presets[name] = serializeTree();
      persistPresetOne(name);
      selectedPresetName = name;
      setLinkedPreset(name); // edits now auto-save to this preset
      renderPresetSelect();
      saySave("Saved preset “" + name + "”");
    };
    endInlineSave();
    if (presets[name]) {
      askConfirm("Overwrite preset?", "A preset named “" + name + "” already exists. Saving replaces it.", write);
    } else {
      write();
    }
  }

  function loadPreset() {
    const name = selectedPresetName;
    if (!name || !presets[name]) { say("No preset selected"); return; }
    askConfirm(
      "Load “" + name + "”?",
      "Loading replaces the current layer table. Save it as a preset first if you want to keep it.",
      () => {
        hydrateTree(presets[name]);
        editingId = null;
        render();
        setLinkedPreset(name); // edits now auto-save to this preset
        say("Loaded “" + name + "”");
      }
    );
  }

  function deletePreset() {
    const name = selectedPresetName;
    if (!name || !presets[name]) { say("No preset selected"); return; }
    askConfirm("Delete preset?", "“" + name + "” will be removed from your saved presets.", () => {
      delete presets[name];
      removePresetOne(name);
      if (defaultPresetName === name) defaultPresetName = null; // server clears it too
      if (selectedPresetName === name) selectedPresetName = null;
      if (linkedPresetName === name) setLinkedPreset(null); // stop auto-saving to it
      renderPresetSelect();
      say("Deleted preset “" + name + "”");
    });
  }

  // ---- Rhino Layer_Export.json import ----
  const NULL_GUID = "00000000-0000-0000-0000-000000000000";
  // Rhino's default linetype table order; -1 and 0 are Continuous.
  // Indices are document-specific, so unknown indices fall back to Continuous.
  const RHINO_LT_INDEX = { "-1": "Continuous", "0": "Continuous", "1": "Border", "2": "Center", "3": "DashDot", "4": "Dashed", "5": "Dots", "6": "Hidden" };

  function argbToHex(c) {
    const u = c >>> 0; // signed int32 -> unsigned
    const r = (u >> 16) & 255, g = (u >> 8) & 255, b = u & 255;
    return "#" + [r, g, b].map((x) => x.toString(16).padStart(2, "0")).join("");
  }
  function plotWeightToLabel(w) {
    if (w === 0 || w === undefined || w === null) return "Default";
    if (w < 0) return "No Print";
    return ensurePrintWidth((Math.round(w * 100) / 100).toFixed(2));
  }
  function isRhinoExport(data) {
    return data && Array.isArray(data.Layers) && data.Layers.length > 0 &&
      data.Layers[0].Id !== undefined && data.Layers[0].ParentLayerId !== undefined;
  }
  function importRhinoLayers(data) {
    const src = data.Layers;
    const byId = {};
    let unknownLt = 0;
    for (const L of src) {
      let ltName = RHINO_LT_INDEX[String(L.LinetypeIndex)];
      if (!ltName) { ltName = "Continuous"; unknownLt++; }
      byId[L.Id] = makeLayer(String(L.Name != null ? L.Name : "Layer"), {
        color: typeof L.Color === "number" ? argbToHex(L.Color) : "#000000",
        linetype: ltName,
        printWidth: plotWeightToLabel(L.PlotWeight),
        expanded: L.IsExpanded !== false,
        guid: L.Id,
        rhino: L,   // keep the complete original record for round-trip export
        children: []
      });
    }
    const roots = [];
    for (const L of src) {
      const node = byId[L.Id];
      const parent = L.ParentLayerId && L.ParentLayerId !== NULL_GUID ? byId[L.ParentLayerId] : null;
      if (parent && parent !== node) parent.children.push(node);
      else roots.push(node); // orphans land at root rather than vanish
    }
    root = { id: "ROOT", children: roots };
    selectedId = roots.length ? roots[0].id : null;
    editingId = null;
    render();
    setLinkedPreset(null); // imported data is scratch until you Save As a preset
    say("Imported " + src.length + " layers from Rhino" +
      (unknownLt ? " (" + unknownLt + " custom linetype" + (unknownLt === 1 ? "" : "s") + " set to Continuous)" : ""));
  }

  // ---- Rhino Layer_Export.json export (round-trip) ----
  const REVERSE_LT = { "Continuous": -1, "Border": 1, "Center": 2, "DashDot": 3, "Dashed": 4, "Dots": 5, "Hidden": 6 };
  function hexToARGB(hex) {
    return (0xFF000000 | parseInt(hex.slice(1), 16)) | 0; // opaque, signed int32
  }
  function guidv4() {
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (c) => {
      const r = (Math.random() * 16) | 0;
      return (c === "x" ? r : (r & 3) | 8).toString(16);
    });
  }
  function layerToRhinoRecord(layer, parentGuid) {
    if (!layer.guid) layer.guid = guidv4();
    const R = layer.rhino;
    // Preserve original encodings when the visible value wasn't edited.
    const colorInt = R && argbToHex(R.Color) === layer.color ? R.Color : hexToARGB(layer.color);
    let ltIdx;
    if (R && (RHINO_LT_INDEX[String(R.LinetypeIndex)] || "Continuous") === layer.linetype) ltIdx = R.LinetypeIndex;
    else ltIdx = REVERSE_LT[layer.linetype] !== undefined ? REVERSE_LT[layer.linetype] : -1;
    let pw;
    if (R && plotWeightToLabel(R.PlotWeight) === layer.printWidth) pw = R.PlotWeight;
    else if (layer.printWidth === "Default") pw = 0;
    else if (layer.printWidth === "No Print") pw = -1;
    else if (layer.printWidth === "Hairline") pw = 0.01;
    else pw = parseFloat(layer.printWidth) || 0;
    // Base: the full preserved record (PlotColor, locks, layout fields, any
    // future fields) — or sensible defaults for layers created in the emulator.
    const base = R ? Object.assign({}, R) : {
      Id: "", Name: "", ParentLayerId: NULL_GUID,
      IsLocked: false, IsExpanded: true, LinetypeIndex: -1, IsVisible: true,
      Color: colorInt, PlotWeight: 0, PlotColor: colorInt,
      LayoutIsVisible: true, LayoutColor: colorInt,
      LayoutPlotWeight: 0, LayoutPlotColor: colorInt
    };
    // If plot/layout colors tracked the display color originally, keep them in sync.
    if (R && R.PlotColor === R.Color) base.PlotColor = colorInt;
    if (R && R.LayoutColor === R.Color) base.LayoutColor = colorInt;
    if (R && R.LayoutPlotColor === R.Color) base.LayoutPlotColor = colorInt;
    return Object.assign(base, {
      Id: layer.guid,
      Name: layer.name,
      ParentLayerId: parentGuid || NULL_GUID,
      IsExpanded: !!layer.expanded,
      LinetypeIndex: ltIdx,
      Color: colorInt,
      PlotWeight: pw
    });
  }
  async function exportRhino() {
    const out = [];
    (function walk(node, parentGuid) {
      for (const c of node.children) {
        out.push(layerToRhinoRecord(c, parentGuid)); // assigns c.guid if missing
        walk(c, c.guid);
      }
    })(root, null);
    if (!out.length) { say("No layers to export"); return; }
    const json = JSON.stringify({ Layers: out }, null, 2);
    const base = (linkedPresetName || selectedPresetName || "Layer_Export").replace(/[^\w.-]+/g, "_");
    const filename = base + ".json";

    // Embedded (e.g. Notion iframe): the file picker and in-frame downloads are
    // blocked by the sandbox. POST to the server and let it download in a new
    // top-level tab, which the sandbox does not block.
    let embedded = false;
    try { embedded = window.self !== window.top; } catch (e) { embedded = true; }
    if (embedded) {
      const form = document.createElement("form");
      form.method = "POST";
      form.action = "api/export";
      form.target = "_blank";
      const add = (n, v) => { const i = document.createElement("input"); i.type = "hidden"; i.name = n; i.value = v; form.appendChild(i); };
      add("filename", filename);
      add("json", json);
      document.body.appendChild(form);
      form.submit();
      form.remove();
      say("Exported " + out.length + " layers (opened in a new tab)");
      return;
    }

    // Preferred: native OS "Save As" dialog (Chrome/Edge on Windows).
    if (window.showSaveFilePicker) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: filename,
          types: [{ description: "Rhino Layer Export", accept: { "application/json": [".json"] } }]
        });
        const w = await handle.createWritable();
        await w.write(json);
        await w.close();
        say("Exported " + out.length + " layers to " + handle.name);
        return;
      } catch (e) {
        if (e && e.name === "AbortError") { say("Export canceled"); return; } // user closed the dialog
        // any other failure → fall through to the download fallback below
      }
    }

    // Fallback: anchor download (goes to the browser's download folder).
    const blob = new Blob([json], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 1500); // revoke AFTER the download starts
    say("Exported " + out.length + " layers in Rhino format");
  }

  function importPresets(file) {
    const reader = new FileReader();
    reader.onload = () => {
      let data;
      try {
        data = JSON.parse(String(reader.result).replace(/^\uFEFF/, ""));
      } catch (e) {
        say("Couldn't parse that file as JSON: " + e.message, 6000);
        return;
      }
      if (Array.isArray(data)) data = { Layers: data }; // tolerate a bare layer array
      if (isRhinoExport(data)) {
        // Name the preset after the file (minus extension); import loads the
        // layers AND saves them as a preset so they land in the library.
        const base = file.name.replace(/\.[^.]+$/, "").trim() || "Imported Layers";
        const doImport = () => {
          importRhinoLayers(data);            // load the layers into the table
          presets[base] = serializeTree();    // capture them as a preset
          selectedPresetName = base;
          setLinkedPreset(base);              // link so auto-save can target it
          persistPresetOne(base);             // persist to the server
          renderPresetSelect();
          saySave("Saved as preset “" + base + "”");
        };
        if (presets[base]) {
          askConfirm(
            "Overwrite preset?",
            "A preset named “" + base + "” already exists. Importing replaces it.",
            doImport
          );
        } else {
          doImport();
        }
        return;
      }
      const incoming = data && data.presets && typeof data.presets === "object" ? data.presets : null;
      if (!incoming) { say("JSON read OK, but no \u201CLayers\u201D array or presets found in it", 6000); return; }
      let n = 0;
      for (const [name, tree] of Object.entries(incoming)) {
        if (Array.isArray(tree)) { presets[name] = tree; n++; persistPresetOne(name); }
      }
      if (!apiMode) persistPresets();
      renderPresetSelect();
      say("Imported " + n + " preset" + (n === 1 ? "" : "s"));
    };
    reader.readAsText(file);
  }

  // ---- Wire up ----
  document.getElementById("addLayerBtn").addEventListener("click", addLayer);
  document.getElementById("addChildBtn").addEventListener("click", addChild);
  document.getElementById("deleteBtn").addEventListener("click", deleteSelected);
  document.getElementById("upBtn").addEventListener("click", () => moveSelected(-1));
  document.getElementById("downBtn").addEventListener("click", () => moveSelected(1));
  document.getElementById("indentBtn").addEventListener("click", indentSelected);
  document.getElementById("outdentBtn").addEventListener("click", outdentSelected);
  document.getElementById("savePresetBtn").addEventListener("click", beginInlineSave);
  document.getElementById("loadPresetBtn").addEventListener("click", loadPreset);
  document.getElementById("deletePresetBtn").addEventListener("click", deletePreset);
  autosaveToggle.addEventListener("change", toggleAutosave);
  presetTrigger.addEventListener("click", (e) => { e.stopPropagation(); openPresetMenu(); });
  presetTrigger.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " " || e.key === "ArrowDown") { e.preventDefault(); openPresetMenu(); }
  });
  document.getElementById("exportRhinoBtn").addEventListener("click", exportRhino);
  document.getElementById("importPresetsBtn").addEventListener("click", () => document.getElementById("importFile").click());
  document.getElementById("importFile").addEventListener("change", (e) => {
    if (e.target.files && e.target.files[0]) importPresets(e.target.files[0]);
    e.target.value = "";
  });
  presetNameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); commitInlineSave(); }
    else if (e.key === "Escape") { e.preventDefault(); endInlineSave(); }
  });
  presetNameInput.addEventListener("blur", () => { endInlineSave(); });

  // Drop on empty space below the rows → move to root level (end of table)
  rowsEl.addEventListener("scroll", closeDropdown);
  window.addEventListener("resize", closeDropdown);
  rowsEl.addEventListener("dragover", (e) => {
    if (dragId && e.target === rowsEl) e.preventDefault();
  });
  rowsEl.addEventListener("drop", (e) => {
    if (!dragId || e.target !== rowsEl) return;
    e.preventDefault();
    const hit = find(dragId);
    if (hit && hit.parent) {
      hit.parent.children.splice(hit.parent.children.indexOf(hit.node), 1);
      root.children.push(hit.node);
      selectedId = hit.node.id;
      render();
      markDirty();
    }
    dragId = null;
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && openPop) { closeDropdown(); return; }
    if (editingId || overlay.classList.contains("show")) return;
    const tag = document.activeElement && document.activeElement.tagName;
    if (tag === "INPUT" || tag === "SELECT") return;
    if (e.key === "ArrowUp" && (e.altKey || e.metaKey)) { e.preventDefault(); moveSelected(-1); }
    else if (e.key === "ArrowDown" && (e.altKey || e.metaKey)) { e.preventDefault(); moveSelected(1); }
    else if (e.key === "Delete") { deleteSelected(); }
    else if (e.key === "F2") {
      if (selectedId) { editingId = selectedId; render(); }
    } else if (e.key === "ArrowUp" || e.key === "ArrowDown") {
      const flat = flatten(root, 0, []);
      const i = flat.findIndex((f) => f.layer.id === selectedId);
      if (i === -1 && flat.length) { selectedId = flat[0].layer.id; render(); return; }
      const j = i + (e.key === "ArrowUp" ? -1 : 1);
      if (j >= 0 && j < flat.length) {
        e.preventDefault();
        selectedId = flat[j].layer.id;
        render();
      }
    }
  });

  // ---- Column resizing ----
  // Name column is flexible (1fr); these three are fixed, resizable widths (px).
  const COL_MIN = [28, 40, 40];   // Color, Linetype, Print width
  const COL_MAX = [90, 260, 180];
  let colW = [48, 132, 90];

  function applyCols() {
    const panel = document.querySelector(".panel");
    panel.style.setProperty("--cols",
      "minmax(120px,1fr) " + colW.map((w) => w + "px").join(" "));
    positionResizers();
  }
  function positionResizers() {
    const head = document.getElementById("gridHead");
    const headRect = head.getBoundingClientRect();
    const spans = head.querySelectorAll("span");
    head.querySelectorAll(".col-resizer").forEach((rz) => {
      const col = +rz.dataset.col; // divider sits at the right edge of span[col]
      const spanRect = spans[col].getBoundingClientRect();
      rz.style.left = (spanRect.right - headRect.left) + "px";
    });
  }

  (function wireResizers() {
    let active = null; // { col, startX, startW }
    document.querySelectorAll(".col-resizer").forEach((rz) => {
      rz.addEventListener("mousedown", (e) => {
        e.preventDefault();
        closeDropdown();
        const col = +rz.dataset.col;
        active = { col, startX: e.clientX, startW: colW[col] };
        rz.classList.add("active");
        document.body.classList.add("col-resizing");
      });
    });
    document.addEventListener("mousemove", (e) => {
      if (!active) return;
      // Dragging divider[col] right shrinks the Name column and widens col.
      const delta = active.startX - e.clientX;
      const i = active.col;
      // Space cap: fixed columns must leave the Name column its 120px minimum.
      const head = document.getElementById("gridHead");
      const avail = head.clientWidth - 22; // header horizontal padding
      const others = colW.reduce((s, w, j) => (j === i ? s : s + w), 0);
      const maxBySpace = avail - 120 - others;
      colW[i] = Math.max(COL_MIN[i], Math.min(COL_MAX[i], maxBySpace, active.startW + delta));
      applyCols();
    });
    document.addEventListener("mouseup", () => {
      if (!active) return;
      active = null;
      document.querySelectorAll(".col-resizer.active").forEach((r) => r.classList.remove("active"));
      document.body.classList.remove("col-resizing");
    });
  })();

  window.addEventListener("resize", positionResizers);

  // ---- Theme ----
  const THEME_KEY = "rhino-layer-emulator-theme";
  const ICON_SUN = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="8" cy="8" r="3.2"/><path d="M8 1.2v1.8M8 13v1.8M1.2 8H3M13 8h1.8M3.2 3.2l1.3 1.3M11.5 11.5l1.3 1.3M12.8 3.2l-1.3 1.3M4.5 11.5l-1.3 1.3"/></svg>';
  const ICON_MOON = '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M13.4 9.9A5.6 5.6 0 0 1 6.1 2.6 5.9 5.9 0 1 0 13.4 9.9z"/></svg>';
  const themeBtn = document.getElementById("themeToggle");
  let isLight = true; // light mode is the default

  function applyTheme() {
    document.body.classList.toggle("light", isLight);
    themeBtn.innerHTML = isLight ? ICON_MOON : ICON_SUN;
    themeBtn.dataset.tip = isLight ? "Dark mode" : "Light mode";
  }
  themeBtn.addEventListener("click", () => {
    isLight = !isLight;
    applyTheme();
    try {
      if (window.storage && window.storage.set) window.storage.set(THEME_KEY, isLight ? "light" : "dark");
    } catch (e) { /* in-memory only */ }
  });
  (async function loadTheme() {
    try {
      if (window.storage && window.storage.get) {
        const res = await window.storage.get(THEME_KEY);
        if (res && res.value === "dark") { isLight = false; }
        else if (res && res.value === "light") { isLight = true; }
      }
    } catch (e) { /* default light */ }
    applyTheme();
  })();

  // ---- Init ----
  applyCols();
  render();
  updateAutosaveToggle();
  (async function init() {
    await loadPresets();        // populates presets, sets apiMode, renders the select
    await loadDefaultPreset();  // reads the shared startup default
    if (defaultPresetName && presets[defaultPresetName]) {
      hydrateTree(presets[defaultPresetName]);
      editingId = null;
      render();
      selectedPresetName = defaultPresetName;
      setLinkedPreset(defaultPresetName); // edits auto-save back to the default
      say("Loaded default preset “" + defaultPresetName + "”");
    }
    renderPresetSelect();       // reflect the ★ marker + current selection in the trigger
  })();
})();
</script>
</body>
</html>
